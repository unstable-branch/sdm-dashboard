services:
  # ── Core (always needed) ──
  postgres:
    profiles: ["core", "dev", "full"]
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: sdm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: sdm_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdm -d sdm_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sdm-network

  redis:
    profiles: ["core", "dev", "full"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

  # ── Storage ──
  garage:
    profiles: ["storage", "dev", "full"]
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN is required}
      - GARAGE_DEFAULT_ACCESS_KEY=${GARAGE_ACCESS_KEY:?GARAGE_ACCESS_KEY is required}
      - GARAGE_DEFAULT_SECRET_KEY=${GARAGE_SECRET_KEY:?GARAGE_SECRET_KEY is required}
      - GARAGE_DEFAULT_BUCKET=${GARAGE_BUCKET:-sdm-artifacts}
    volumes:
      - garage-data:/var/lib/garage
      - ./garage/config.toml:/etc/garage.toml:ro
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sdm-network

  # ── Computation ──
  plumber:
    profiles: ["computation", "dev", "full"]
    image: sdm-dashboard-plumber:latest
    build:
      context: .
      dockerfile: plumber/Dockerfile
    volumes:
      - plumber-data:/app/data
      - upload-data:/app/data/uploads
      - plumber-outputs:/app/outputs
      - plumber-covariates:/app/covariates
      - plumber-worldclim:/app/Worldclim
    environment:
      - SDM_PROJECT_ROOT=/app
      - DATABASE_URL=postgresql://sdm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sdm_platform
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:?PLUMBER_INTERNAL_KEY is required}
      - PLUMBER_AUTH_DISABLED=${PLUMBER_AUTH_DISABLED:-false}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    networks:
      - sdm-network

  # ── Web proxy ──
  api:
    profiles: ["proxy", "dev", "full"]
    image: sdm-dashboard-api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        - PNPM_REGISTRY=${PNPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${FRONTEND_API_URL:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DATABASE_URL=postgresql://sdm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sdm_platform
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PLUMBER_URL=${PLUMBER_URL:-http://plumber:8000}
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:?PLUMBER_INTERNAL_KEY is required}
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT:-http://garage:3900}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY:?GARAGE_ACCESS_KEY is required}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY:?GARAGE_SECRET_KEY is required}
      - GARAGE_BUCKET_RASTERS=${GARAGE_BUCKET:-sdm-artifacts}
      - GARAGE_BUCKET_EXPORTS=${GARAGE_BUCKET:-sdm-artifacts}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@sdm-dashboard.local}
      - APP_URL=${APP_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - upload-data:/app/data/uploads
      - plumber-outputs:/app/outputs:ro
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
      plumber:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

  frontend:
    profiles: ["proxy", "dev", "full"]
    image: sdm-dashboard-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - PNPM_REGISTRY=${PNPM_REGISTRY:-https://registry.npmmirror.com}
        - API_URL=${FRONTEND_API_URL:-http://api:4000}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

volumes:
  postgres-data:
  redis-data:
  garage-data:
  plumber-data:
  plumber-outputs:
  plumber-covariates:
  plumber-worldclim:
  upload-data:

networks:
  sdm-network:
    driver: bridge
