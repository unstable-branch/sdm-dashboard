services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: sdm
      POSTGRES_PASSWORD: sdm_password
      POSTGRES_DB: sdm_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sdm-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

  garage:
    image: dxflrs/garage:v2.2.0
    command: server
    environment:
      GARAGE_BOOTSTRAP_TOKEN: "sdm-bootstrap-token"
      GARAGE_DATA_DIR: /var/lib/garage
      GARAGE_RPC_BIND_ADDR: "0.0.0.0:3902"
      GARAGE_S3_API_BIND_ADDR: "0.0.0.0:3900"
      GARAGE_S3_WEB_BIND_ADDR: "0.0.0.0:3901"
      GARAGE_S3_ROOT_ACCESS_KEY_ID: "sdm"
      GARAGE_S3_ROOT_SECRET_KEY: "sdm_garage_secret"
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
    volumes:
      - garage-data:/var/lib/garage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3901/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sdm-network

  plumber:
    build:
      context: .
      dockerfile: plumber/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - plumber-data:/app/data
      - plumber-outputs:/app/outputs
      - plumber-covariates:/app/covariates
      - plumber-worldclim:/app/Worldclim
    environment:
      - SDM_PROJECT_ROOT=/app
      - PLUMBER_INTERNAL_KEY=sdm-internal-key-change-in-production
      - PLUMBER_AUTH_DISABLED=false
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    networks:
      - sdm-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        - PNPM_REGISTRY=${PNPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sdm:sdm_password@postgres:5432/sdm_platform
      - REDIS_URL=redis://redis:6379
      - PLUMBER_URL=http://plumber:8000
      - PLUMBER_INTERNAL_KEY=sdm-internal-key-change-in-production
      - GARAGE_ENDPOINT=http://garage:3900
      - GARAGE_ACCESS_KEY=sdm
      - GARAGE_SECRET_KEY=sdm_garage_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      plumber:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - PNPM_REGISTRY=${PNPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

volumes:
  postgres-data:
  redis-data:
  garage-data:
  plumber-data:
  plumber-outputs:
  plumber-covariates:
  plumber-worldclim:

networks:
  sdm-network:
    driver: bridge
