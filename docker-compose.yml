services:
  # ── Core (always needed) ──
  postgres:
    profiles: ["core", "dev", "full"]
    restart: unless-stopped
    image: postgis/postgis:16-3.4
    shm_size: 256m
    environment:
      POSTGRES_USER: sdm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: sdm_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdm -d sdm_platform || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - sdm-network

  redis:
    profiles: ["core", "dev", "full"]
    restart: unless-stopped
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: ["redis-server", "--maxmemory", "2gb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - sdm-network

  # ── Storage ──
  garage:
    profiles: ["storage", "dev", "full"]
    restart: unless-stopped
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN is required}
      - GARAGE_DEFAULT_ACCESS_KEY=${GARAGE_ACCESS_KEY:?GARAGE_ACCESS_KEY is required}
      - GARAGE_DEFAULT_SECRET_KEY=${GARAGE_SECRET_KEY:?GARAGE_SECRET_KEY is required}
      - GARAGE_DEFAULT_BUCKET=${GARAGE_BUCKET:-sdm-artifacts}
    volumes:
      - garage-data:/var/lib/garage
      - ./garage/config.toml:/etc/garage.toml:ro
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sdm-network

  # ── Computation ──
  plumber:
    profiles: ["computation", "dev", "full"]
    restart: unless-stopped
    image: sdm-dashboard-plumber:latest
    build:
      context: .
      dockerfile: plumber/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - plumber-data:/app/data
      - upload-data:/app/data/uploads
      - plumber-outputs:/app/outputs
      - plumber-covariates:/app/covariates
      - plumber-worldclim:/app/Worldclim
      - plumber-chelsa:/app/chelsa
      - plumber-future:/app/Worldclim_future
    environment:
      - SDM_PROJECT_ROOT=/app
      - DATABASE_URL=postgresql://sdm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sdm_platform
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:?PLUMBER_INTERNAL_KEY is required}
      - PLUMBER_AUTH_DISABLED=${PLUMBER_AUTH_DISABLED:-false}
      - GDAL_CACHEMAX=512
      - SDM_CHILD_MAX_VSIZE=6Gb
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
      - SDM_MIN_GPU_VRAM_MIB=1500
      - SDM_ENCRYPTION_KEY=${SDM_ENCRYPTION_KEY:?SDM_ENCRYPTION_KEY is required}
      - ALA_API_KEY=${ALA_API_KEY:-}
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f --connect-timeout 5 http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: ${PLUMBER_CPU_LIMIT:-8}
          memory: 8G
    networks:
      - sdm-network

  # ── Web proxy ──
  api:
    profiles: ["proxy", "dev", "full"]
    restart: unless-stopped
    image: sdm-dashboard-api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        - PNPM_REGISTRY=${PNPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - SDM_PROJECT_ROOT=/app
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${FRONTEND_API_URL:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CSRF_SECRET=${CSRF_SECRET:?CSRF_SECRET is required}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
      - DATABASE_URL=postgresql://sdm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sdm_platform
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PLUMBER_URL=${PLUMBER_URL:-http://plumber:8000}
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:?PLUMBER_INTERNAL_KEY is required}
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT:-http://garage:3900}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY:?GARAGE_ACCESS_KEY is required}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY:?GARAGE_SECRET_KEY is required}
      - GARAGE_BUCKET_RASTERS=${GARAGE_BUCKET:-sdm-artifacts}
      - GARAGE_BUCKET_EXPORTS=${GARAGE_BUCKET:-sdm-artifacts}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@sdm-dashboard.local}
      - APP_URL=${APP_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - upload-data:/app/data/uploads
      - plumber-outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
      plumber:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - sdm-network

  frontend:
    profiles: ["proxy", "dev", "full"]
    restart: unless-stopped
    image: sdm-dashboard-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - PNPM_REGISTRY=${PNPM_REGISTRY:-https://registry.npmmirror.com}
        - API_URL=${FRONTEND_API_URL:-http://api:4000}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 5s
      start_period: 30s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - sdm-network

volumes:
  postgres-data:
  redis-data:
  garage-data:
  plumber-data:
  plumber-outputs:
  plumber-covariates:
  plumber-worldclim:
  plumber-chelsa:
  plumber-future:
  upload-data:

networks:
  sdm-network:
    driver: bridge
