services:
  sdm-dashboard:
    build: .
    ports:
      - "3838:3838"
    environment:
      PORT: "3838"
      # OPENTOPOGRAPHY_API_KEY: "set-in-your-shell-or-compose-override"
    volumes:
      - ./outputs:/srv/sdm-dashboard/outputs
      - ./Worldclim:/srv/sdm-dashboard/Worldclim
      - ./chelsa:/srv/sdm-dashboard/chelsa
      - ./covariates:/srv/sdm-dashboard/covariates
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3838 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
