services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: sdm
      POSTGRES_PASSWORD: sdm_password
      POSTGRES_DB: sdm_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  garage:
    image: dxflrs/garage:latest
    command: server
    environment:
      GARAGE_BOOTSTRAP_TOKEN: "sdm-bootstrap-token"
      GARAGE_DATA_DIR: /var/lib/garage
      GARAGE_RPC_BIND_ADDR: "0.0.0.0:3902"
      GARAGE_S3_API_BIND_ADDR: "0.0.0.0:3900"
      GARAGE_S3_WEB_BIND_ADDR: "0.0.0.0:3901"
      GARAGE_S3_ROOT_ACCESS_KEY_ID: "sdm"
      GARAGE_S3_ROOT_SECRET_KEY: "sdm_garage_secret"
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
    volumes:
      - garage-data:/var/lib/garage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3901/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  garage-data:
