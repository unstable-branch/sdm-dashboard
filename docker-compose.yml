services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: sdm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdm_password}
      POSTGRES_DB: sdm_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdm -d sdm_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sdm-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

  garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN:-dev-admin-token}
      - GARAGE_DEFAULT_ACCESS_KEY=${GARAGE_ACCESS_KEY:-dev-access-key}
      - GARAGE_DEFAULT_SECRET_KEY=${GARAGE_SECRET_KEY:-dev-secret-key-for-local-only}
      - GARAGE_DEFAULT_BUCKET=${GARAGE_BUCKET:-sdm-artifacts}
    volumes:
      - garage-data:/var/lib/garage
      - ./garage/config.toml:/etc/garage.toml:ro
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sdm-network

  plumber:
    image: sdm-dashboard-plumber:latest
    build:
      context: .
      dockerfile: plumber/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - plumber-data:/app/data
      - upload-data:/app/data/uploads
      - plumber-outputs:/app/outputs
      - plumber-covariates:/app/covariates
      - plumber-worldclim:/app/Worldclim
    environment:
      - SDM_PROJECT_ROOT=/app
      - DATABASE_URL=postgresql://sdm:${POSTGRES_PASSWORD:-sdm_password}@postgres:5432/sdm_platform
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:-6e94feb6699652f8529ed79ee7863a4daab79279286e84f0c4026fe2fb29884e}
      - PLUMBER_AUTH_DISABLED=${PLUMBER_AUTH_DISABLED:-false}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    networks:
      - sdm-network

  api:
    image: sdm-dashboard-api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        - PNPM_REGISTRY=${PNPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-1cfe8b19ba5bc7a3c78186acda6c7df23f7a14ac8c251b6ecdca2159b1561bb9}
      - DATABASE_URL=postgresql://sdm:${POSTGRES_PASSWORD:-sdm_password}@postgres:5432/sdm_platform
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PLUMBER_URL=${PLUMBER_URL:-http://plumber:8000}
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:-6e94feb6699652f8529ed79ee7863a4daab79279286e84f0c4026fe2fb29884e}
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT:-http://garage:3900}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY:-dev-access-key}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY:-dev-secret-key-for-local-only}
      - GARAGE_BUCKET_RASTERS=${GARAGE_BUCKET:-sdm-artifacts}
      - GARAGE_BUCKET_EXPORTS=${GARAGE_BUCKET:-sdm-artifacts}
    volumes:
      - upload-data:/app/data/uploads
      - plumber-outputs:/app/outputs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
      plumber:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

  frontend:
    image: sdm-dashboard-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - PNPM_REGISTRY=${PNPM_REGISTRY:-https://registry.npmmirror.com}
        - API_URL=${FRONTEND_API_URL:-http://api:4000}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

volumes:
  postgres-data:
  redis-data:
  garage-data:
  plumber-data:
  plumber-outputs:
  plumber-covariates:
  plumber-worldclim:
  upload-data:

networks:
  sdm-network:
    driver: bridge
