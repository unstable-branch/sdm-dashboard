# Production compose — optimized images, reverse proxy, monitoring
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - sdm-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runner
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sdm-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: runner
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sdm:sdm_password@postgres:5432/sdm_platform
      - REDIS_URL=redis://redis:6379
      - PLUMBER_URL=http://plumber:8000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - GARAGE_ENDPOINT=http://garage:3900
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY:-access-key}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY:-secret-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      plumber:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sdm-network
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: sdm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdm_password}
      POSTGRES_DB: sdm_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdm-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network
    restart: unless-stopped

  plumber:
    build:
      context: .
      dockerfile: plumber/Dockerfile
    volumes:
      - r-data:/app/outputs
      - r-climate:/app/Worldclim
      - r-chelsa:/app/chelsa
      - r-future:/app/Worldclim_future
    environment:
      - SDM_PROJECT_ROOT=/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - sdm-network
    restart: unless-stopped

  garage:
    image: dxflrs/garage:v2.2.0
    ports:
      - "3900:3900"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3901/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sdm-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - sdm-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - sdm-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  garage-meta:
  garage-data:
  r-data:
  r-climate:
  r-chelsa:
  r-future:
  prometheus-data:
  grafana-data:

networks:
  sdm-network:
    driver: bridge
