# Production compose — optimized images, reverse proxy, monitoring
# Usage: configure image digests, then docker compose -f docker-compose.prod.yml up -d --no-build

services:
  nginx:
    image: docker.io/library/nginx:1.25-alpine@sha256:516475cc129da42866742567714ddc681e5eed7b9ee0b9e9c015e464b4221a00
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "--connect-timeout", "3", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - sdm-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/unstable-branch/sdm-dashboard/sdm-frontend@${SDM_FRONTEND_DIGEST:?SDM_FRONTEND_DIGEST is required}
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sdm-network
    restart: unless-stopped

  api:
    image: ghcr.io/unstable-branch/sdm-dashboard/sdm-api@${SDM_API_DIGEST:?SDM_API_DIGEST is required}
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?Database connection string is required}
      - REDIS_URL=redis://redis:6379
      - PLUMBER_URL=http://plumber:8000
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:?PLUMBER_INTERNAL_KEY is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CSRF_SECRET=${CSRF_SECRET:?CSRF_SECRET is required}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
      - GARAGE_ENDPOINT=http://garage:3900
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY:?GARAGE_ACCESS_KEY is required}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY:?GARAGE_SECRET_KEY is required}
      - GARAGE_BUCKET_RASTERS=${GARAGE_BUCKET_RASTERS:?GARAGE_BUCKET_RASTERS is required}
      - GARAGE_BUCKET_EXPORTS=${GARAGE_BUCKET_EXPORTS:?GARAGE_BUCKET_EXPORTS is required}
    volumes:
      - r-data:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
      plumber:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sdm-network
    restart: unless-stopped

  postgres:
    image: docker.io/postgis/postgis:16-3.4@sha256:44126d872ac91993766c341e369c539e8196614321765d36a6f1bab0419a5fa5
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      POSTGRES_USER: sdm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: sdm_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdm-network
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network
    restart: unless-stopped

  plumber:
    image: ghcr.io/unstable-branch/sdm-dashboard/sdm-plumber-${SDM_PLUMBER_VARIANT:-cpu}@${SDM_PLUMBER_DIGEST:?SDM_PLUMBER_DIGEST is required}
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    volumes:
      - r-data:/app/outputs
      - r-climate:/app/Worldclim
      - r-chelsa:/app/chelsa
      - r-future:/app/Worldclim_future
    environment:
      - SDM_PROJECT_ROOT=/app
      - DATABASE_URL=${DATABASE_URL:?Database connection string is required}
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:?PLUMBER_INTERNAL_KEY is required}
      - PLUMBER_AUTH_DISABLED=false
      - SDM_ENCRYPTION_KEY=${SDM_ENCRYPTION_KEY:?SDM_ENCRYPTION_KEY is required}
      - ALA_API_KEY=${ALA_API_KEY:-}
      - REDIS_URL=redis://redis:6379
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f --connect-timeout 5 http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sdm-network
    restart: unless-stopped

  garage:
    image: docker.io/dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
    command: ["/garage", "server"]
    ports:
      - "3900:3900"
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN is required}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sdm-network
    restart: unless-stopped

  postgres-exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.16.0@sha256:6999a7657e2f2fb0ca6ebf417213eebf6dc7d21b30708c622f6fcb11183a2bb0
    environment:
      DATA_SOURCE_NAME: postgresql://sdm:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sdm_platform?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - sdm-network
    restart: unless-stopped

  redis-exporter:
    image: docker.io/oliver006/redis_exporter:v1.67.0@sha256:120f7ec77293459ccfdad66bb1db75ab72e8bfeab99f58b1cc2564cadcd7a9e7
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - sdm-network
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:v2.53.0@sha256:075b1ba2c4ebb04bc3a6ab86c06ec8d8099f8fda1c96ef6d104d9bb1def1d8bc
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - sdm-network
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana:11.0.0@sha256:0dc5a246ab16bb2c38a349fb588174e832b4c6c2db0981d0c3e6cd774ba66a54
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - sdm-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  garage-meta:
  garage-data:
  r-data:
  r-climate:
  r-chelsa:
  r-future:
  prometheus-data:
  grafana-data:

networks:
  sdm-network:
    driver: bridge
