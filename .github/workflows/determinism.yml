name: Determinism Validation

on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determinism:
    name: Backend determinism (seed + nthread=1)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin \
            libcurl4-openssl-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libssl-dev \
            libudunits2-dev \
            libxml2-dev \
            make \
            proj-data

      - name: Clean renv library to fix broken pak symlinks
        run: rm -rf renv/library

      - name: Install R packages (all backends)
        env:
          RENV_PROJECT: ""
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          dependencies: '"hard"'
          extra-packages: 'any::testthat, any::terra, any::gam, any::ranger, any::xgboost, any::randomForest, any::matrixStats'
          cache-version: 3

      - name: Run determinism tests
        run: |
          Rscript -e '
            library(testthat)
            source("R/core/bootstrap.R")
            source("R/load.R")
            source("tests/testthat/helper-fixtures.R")
            source("tests/testthat/helper-load.R")
            results <- test_file("tests/testthat/test-determinism.R", reporter = "summary", stop_on_failure = FALSE)
            failed <- sum(as.data.frame(results)$failed)
            errored <- sum(as.data.frame(results)$error)
            if (failed > 0 || errored > 0) {
              stop(sprintf("Determinism validation failed: %d failures, %d errors", failed, errored))
            }
            message("All determinism tests passed.")
          '
