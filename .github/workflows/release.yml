name: Release Candidate Publication

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  validate:
    name: Validate tagged release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate tag, version, changelog, and main ancestry
        run: |
          python3 scripts/audit_release_config.py "${RELEASE_TAG}"
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release tag must point to a commit contained in main." >&2
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:node
      - run: pnpm run check:compose
      - run: pnpm run check:accelerators
      - run: pnpm run check:release

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libcurl4-openssl-dev libgdal-dev libgeos-dev libproj-dev \
            libssl-dev libudunits2-dev libxml2-dev make proj-data

      - name: Install R dependencies
        env:
          RENV_PROJECT: ""
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: 'any::testthat, any::matrixStats'
          cache-version: 4

      - name: Run R release gates
        run: |
          Rscript scripts/smoke_test.R --tags=fast
          Rscript tests/testthat.R
          Rscript scripts/audit_release.R

      - name: Check release diff hygiene
        run: git diff --check

  build-images:
    name: Publish ${{ matrix.image }}
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: sdm-plumber-cpu
            dockerfile: plumber/Dockerfile
          - image: sdm-plumber-cuda
            dockerfile: plumber/Dockerfile.cuda
          - image: sdm-plumber-rocm
            dockerfile: plumber/Dockerfile.rocm
          - image: sdm-api
            dockerfile: Dockerfile.api
          - image: sdm-frontend
            dockerfile: Dockerfile.frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate immutable and SemVer image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ env.RELEASE_TAG }}
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and publish
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=release-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.image }}
          provenance: mode=max
          sbom: true

      - name: Record immutable digest
        run: |
          mkdir -p image-digests
          printf '%s@%s\n' \
            '${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}' \
            '${{ steps.build.outputs.digest }}' \
            > 'image-digests/${{ matrix.image }}.txt'
          cat 'image-digests/${{ matrix.image }}.txt' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}
          path: image-digests/${{ matrix.image }}.txt
          if-no-files-found: error
          retention-days: 30

  draft-release:
    name: Assemble draft release
    needs: [validate, build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: image-digests
          merge-multiple: true

      - name: Build and checksum release artifacts
        run: |
          Rscript scripts/make_release_zip.R source --version="${RELEASE_TAG}"
          Rscript scripts/make_release_zip.R windows-ready --version="${RELEASE_TAG}"
          mv "../sdm-dashboard-${RELEASE_TAG}-source.zip" .
          mv "../sdm-dashboard-${RELEASE_TAG}-windows-ready.zip" .
          sort image-digests/*.txt > image-digests.txt
          sha256sum \
            "sdm-dashboard-${RELEASE_TAG}-source.zip" \
            "sdm-dashboard-${RELEASE_TAG}-windows-ready.zip" \
            > SHA256SUMS
          test "$(wc -l < image-digests.txt)" -eq 5

      - name: Create review-only draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: |
            sdm-dashboard-${{ env.RELEASE_TAG }}-source.zip
            sdm-dashboard-${{ env.RELEASE_TAG }}-windows-ready.zip
            SHA256SUMS
            image-digests.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
