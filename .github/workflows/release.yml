name: Release Candidate Publication

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate version, changelog, and release ancestry
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            python3 scripts/audit_release_config.py "${RELEASE_TAG}"
            git fetch --no-tags origin main
            if ! git merge-base --is-ancestor HEAD origin/main; then
              echo "Release tag must point to a commit contained in main." >&2
              exit 1
            fi
          else
            python3 scripts/audit_release_config.py
          fi

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:node
      - run: pnpm run check:compose
      - run: pnpm run check:release

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - run: pnpm run check:accelerators

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libcurl4-openssl-dev libgdal-dev libgeos-dev libproj-dev \
            libssl-dev libudunits2-dev libxml2-dev make proj-data

      - name: Install R dependencies
        env:
          RENV_PROJECT: ""
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          dependencies: '"hard"'
          extra-packages: 'any::testthat, any::matrixStats'
          cache-version: 4

      - name: Run R release gates
        run: |
          Rscript scripts/smoke_test.R --tags=fast
          Rscript tests/testthat.R
          Rscript scripts/audit_release.R

      - name: Check release diff hygiene
        run: git diff --check

  build-images:
    name: Publish ${{ matrix.image }}
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: sdm-plumber-cpu
            dockerfile: plumber/Dockerfile
          - image: sdm-plumber-cuda
            dockerfile: plumber/Dockerfile.cuda
          - image: sdm-plumber-rocm
            dockerfile: plumber/Dockerfile.rocm
          - image: sdm-api
            dockerfile: Dockerfile.api
          - image: sdm-frontend
            dockerfile: Dockerfile.frontend

    steps:
      - name: Free runner disk for accelerator image builds
        if: matrix.image == 'sdm-plumber-cuda' || matrix.image == 'sdm-plumber-rocm'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune --all --force --volumes
          available_gib=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
          echo "Available runner disk: ${available_gib} GiB"
          if [ "${available_gib}" -lt 45 ]; then
            echo "Accelerator image builds require at least 45 GiB free." >&2
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate immutable and SemVer image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ env.RELEASE_TAG }}
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and publish
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=release-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.image }}
          provenance: mode=max
          sbom: true

      - name: Record immutable digest
        run: |
          mkdir -p image-digests
          printf '%s@%s\n' \
            '${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}' \
            '${{ steps.build.outputs.digest }}' \
            > 'image-digests/${{ matrix.image }}.txt'
          cat 'image-digests/${{ matrix.image }}.txt' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.image }}
          path: image-digests/${{ matrix.image }}.txt
          if-no-files-found: error
          retention-days: 30

  draft-release:
    name: Assemble draft release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [validate, build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: digest-*
          path: image-digests
          merge-multiple: true

      - name: Assemble image digest manifest
        run: |
          sort image-digests/*.txt > image-digests.txt
          test "$(wc -l < image-digests.txt)" -eq 5

      - name: Verify images are publicly pullable
        run: python3 scripts/verify_public_ghcr_images.py image-digests.txt

      - name: Build and checksum release artifacts
        run: |
          Rscript scripts/make_release_zip.R source --version="${RELEASE_TAG}"
          Rscript scripts/make_release_zip.R windows-ready --version="${RELEASE_TAG}"
          mv "../sdm-dashboard-${RELEASE_TAG}-source.zip" .
          mv "../sdm-dashboard-${RELEASE_TAG}-windows-ready.zip" .
          sha256sum \
            "sdm-dashboard-${RELEASE_TAG}-source.zip" \
            "sdm-dashboard-${RELEASE_TAG}-windows-ready.zip" \
            > SHA256SUMS

      - name: Create review-only draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: |
            sdm-dashboard-${{ env.RELEASE_TAG }}-source.zip
            sdm-dashboard-${{ env.RELEASE_TAG }}-windows-ready.zip
            SHA256SUMS
            image-digests.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
