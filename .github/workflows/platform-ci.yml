name: Platform CI

on:
  push:
    branches: [main, feature/platform-restructure]
  pull_request:
    branches: [main, feature/platform-restructure]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            packages/shared/package-lock.json

      - run: npm ci
        working-directory: packages/shared

      - run: npm ci
        working-directory: frontend

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  api:
    name: API build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            packages/shared/package-lock.json

      - run: npm ci
        working-directory: packages/shared

      - run: npm ci
        working-directory: api

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  r-quality:
    name: R source + tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libcurl4-openssl-dev libgdal-dev libgeos-dev \
            libproj-dev libssl-dev libudunits2-dev libxml2-dev make proj-data

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: 'any::testthat'
          cache-version: 2

      - name: Parse R sources
        run: |
          files <- list.files(pattern = "[.][Rr]$", recursive = TRUE, full.names = TRUE)
          files <- files[!grepl("^\\.git/", files)]
          for (file in files) parse(file)
          message("Parsed ", length(files), " R source files.")
        shell: Rscript --no-init-file {0}

      - name: Smoke test
        run: Rscript scripts/smoke_test.R

      - name: Testthat suite
        run: Rscript tests/testthat.R

  docker:
    name: Docker compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Validate compose files
        run: docker compose -f docker-compose.dev.yml config

      - name: Validate Plumber Dockerfile
        run: docker build -f plumber/Dockerfile --check .
