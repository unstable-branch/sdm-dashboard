name: R Quality Checks

on:
  push:
    branches: [dev]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: R source and release validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Parse R sources
        run: |
          files <- list.files(pattern = "[.][Rr]$", recursive = TRUE, full.names = TRUE)
          files <- files[!grepl("^\\.git/", files)]
          files <- files[!grepl("/\\.Rprofile$", files)]
          for (file in files) parse(file)
          message("Parsed ", length(files), " R source files.")
        shell: Rscript --no-init-file {0}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin \
            libcurl4-openssl-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libssl-dev \
            libudunits2-dev \
            libxml2-dev \
            make \
            proj-data

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: 'any::testthat'
          cache-version: 1

      - name: Run module smoke check
        run: Rscript scripts/smoke_test.R --tags=fast

      - name: Run lightweight test suite
        run: Rscript tests/testthat.R

      - name: Audit release packaging
        run: Rscript scripts/audit_release.R
