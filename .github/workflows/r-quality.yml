name: R Quality Checks

on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: R source, test, determinism and release validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Parse R sources
        run: |
          files <- list.files(pattern = "[.][Rr]$", recursive = TRUE, full.names = TRUE)
          files <- files[!grepl("^\\.git/", files)]
          files <- files[!grepl("/\\.Rprofile$", files)]
          files <- files[!grepl("/renv/", files)]
          for (file in files) parse(file)
          message("Parsed ", length(files), " R source files.")

          # Also verify _targets.R parses (it has its own engine_load.R dependency chain)
          if (file.exists("_targets.R")) {
            parse("_targets.R")
            message("_targets.R parsed OK")
          }
        shell: Rscript --no-init-file {0}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin \
            libcurl4-openssl-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libssl-dev \
            libudunits2-dev \
            libxml2-dev \
            make \
            proj-data

      - name: Clean renv library to fix broken pak symlinks
        run: rm -rf renv/library

      - name: Install R package dependencies
        env:
          RENV_PROJECT: ""
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          dependencies: '"hard"'
          extra-packages: 'any::testthat, any::matrixStats, any::gam, any::ranger, any::xgboost, any::randomForest'
          cache-version: 3

      - name: Run module smoke check
        run: Rscript scripts/smoke_test.R --tags=fast

      - name: Run lightweight test suite
        run: Rscript tests/testthat.R

      - name: Run backend determinism tests
        run: |
          Rscript -e '
            library(testthat)
            source("R/core/bootstrap.R")
            source("R/load.R")
            source("tests/testthat/helper-fixtures.R")
            source("tests/testthat/helper-load.R")
            results <- test_file("tests/testthat/test-determinism.R", reporter = "summary", stop_on_failure = FALSE)
            failed <- sum(as.data.frame(results)$failed)
            errored <- sum(as.data.frame(results)$error)
            if (failed > 0 || errored > 0) {
              stop(sprintf("Determinism validation failed: %d failures, %d errors", failed, errored))
            }
            message("All determinism tests passed.")
          '

      - name: Build sdmtorch C++ extensions
        run: |
          cd sdmtorch
          # Build CPU-compatible extensions only (cuda_graph.so requires CUDA headers)
          make adam libtorch 2>&1 || echo "WARNING: sdmtorch build failed, continuing"
          cd ..

      - name: Verify sdmtorch .so loads
        run: |
          Rscript -e '
            so_dir <- file.path(getwd(), "sdmtorch")
            for (so in c("train_step_adam.so", "train_step_libtorch.so")) {
              path <- file.path(so_dir, so)
              if (file.exists(path)) {
                tryCatch({
                  dyn.load(path, local = FALSE, now = TRUE)
                  cat(so, "loaded OK\n")
                  dyn.unload(path)
                }, error = function(e) cat(so, "FAILED:", conditionMessage(e), "\n"))
              } else {
                cat(so, "not found — skipping\n")
              }
            }
          '

      - name: Audit release packaging
        run: Rscript scripts/audit_release.R
