metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"
replication_factor = 1

rpc_bind_addr = "[::]:3902"
rpc_public_addr = "garage:3902"
# ⚠️  DEV ONLY: Override via GARAGE_RPC_SECRET env var in production.
#     Generate a real secret: openssl rand -hex 32
rpc_secret = "CHANGEME-run-openssl-rand-hex-32-for-garage-rpc"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3901"
root_domain = ".web.garage.localhost"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
# ⚠️  DEV ONLY: Override via GARAGE_ADMIN_TOKEN env var in production.
admin_token = "CHANGEME-run-openssl-rand-hex-32-for-garage-admin"
metrics_token = "CHANGEME-run-openssl-rand-hex-32-for-garage-metrics"
