# Development compose — mounts local code, runs with profiles.
# Usage:
#   docker compose -f docker-compose.dev.yml --profile core up -d    # postgres + redis only
#   docker compose -f docker-compose.dev.yml --profile email up -d   # + mailpit
#   docker compose -f docker-compose.dev.yml --profile storage up -d # + garage
#   docker compose -f docker-compose.dev.yml --profile all up -d     # everything

services:
  postgres:
    profiles: ["core", "all"]
    image: postgis/postgis:16-3.4
    shm_size: 256m
    environment:
      POSTGRES_USER: sdm
      POSTGRES_PASSWORD: sdm_password
      POSTGRES_DB: sdm_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sdm-network

  redis:
    profiles: ["core", "all"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--maxmemory", "2gb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdm-network

  mailpit:
    profiles: ["email", "all"]
    image: axllent/mailpit:latest
    ports:
      - "5000:8025"
      - "2525:1025"
    networks:
      - sdm-network

  garage:
    profiles: ["storage", "all"]
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN:-dev-admin-token}
      - GARAGE_DEFAULT_ACCESS_KEY=${GARAGE_ACCESS_KEY:-dev-access-key}
      - GARAGE_DEFAULT_SECRET_KEY=${GARAGE_SECRET_KEY:-dev-secret-key-for-local-only}
      - GARAGE_DEFAULT_BUCKET=${GARAGE_BUCKET:-sdm-artifacts}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sdm-network

  plumber:
    profiles: ["computation", "all"]
    build:
      context: .
      dockerfile: plumber/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./R:/app/R:ro
      - ./plumber:/app/plumber:ro
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./covariates:/app/covariates
      - ./Worldclim:/app/Worldclim
    environment:
      - SDM_PROJECT_ROOT=/app
      - DATABASE_URL=postgresql://sdm:${POSTGRES_PASSWORD}@postgres:5432/sdm_platform
      - PLUMBER_INTERNAL_KEY=${PLUMBER_INTERNAL_KEY:-dev-plumber-key}
      - PLUMBER_AUTH_DISABLED=${PLUMBER_AUTH_DISABLED:-true}
       - GDAL_CACHEMAX=512
    init: true
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f --connect-timeout 5 http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sdm-network

  titiler:
    profiles: ["computation", "all"]
    image: ghcr.io/developmentseed/titiler:latest
    ports:
      - "9000:8000"
    volumes:
      - ./outputs:/data/outputs:ro
    command: >
      uvicorn titiler.application.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      - HOST=0.0.0.0
      - TITILER_API_PORT=8000
      # S3 credentials for future Garage integration (requires boto3 in TiTiler image)
    networks:
      - sdm-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  garage-meta:
  garage-data:

networks:
  sdm-network:
    driver: bridge
